default_language_version:
  python: python3.10

repos:
  # Pre-commit maintained hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        description: Remove trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
        description: Ensure files end with a newline
      - id: check-yaml
        name: Check YAML
        description: Validate YAML files
      - id: check-json
        name: Check JSON
        description: Validate JSON files
      - id: check-toml
        name: Check TOML
        description: Validate TOML files
      - id: check-merge-conflict
        name: Check merge conflicts
        description: Detect merge conflicts
      - id: check-added-large-files
        name: Check for large files
        description: Prevent commits of large files
        args: ['--maxkb=500']
      - id: debug-statements
        name: Debug statements
        description: Check for debugger imports and py37+ breakpoint()

  # Code formatting with Black
  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        name: Format code with Black
        description: Auto-format Python code to Black style
        language_version: python3.10
        args: ['--line-length=100']

  # Import sorting with isort
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort imports with isort
        description: Sort and organize imports
        args: ['--profile=black', '--line-length=100']

  # Linting with Pylint
  - repo: https://github.com/PyCQA/pylint
    rev: v3.0.0
    hooks:
      - id: pylint
        name: Lint with Pylint
        description: Check code style and errors with Pylint
        language: system
        entry: pylint
        types: [python]
        args: ['--rcfile=pyproject.toml', '--fail-under=8.0']
        require_serial: true
        pass_filenames: true

  # Docstring formatter (optional)
  - repo: https://github.com/PyCQA/docformatter
    rev: 1.7.5
    hooks:
      - id: docformatter
        name: Format docstrings
        description: Format docstrings to PEP 257
        args: ['--in-place', '--line-length=100']

# Configuration
ci:
  # Skip some hooks on CI (they're checked in workflow anyway)
  skip: [pylint]
  autofix_commit_msg: |
    [pre-commit] Auto-fixes from pre-commit.com hooks

    - Trim trailing whitespace
    - Fix end-of-file newlines
    - Sort imports with isort
    - Format code with Black
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit] auto-update hooks'
  autoupdate_schedule: weekly
